<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black background -->
  <rect width="100" height="100" fill="#000"/>

  <!-- 8 petals, each an ellipse rotated around centre (50,50) -->
  <ellipse cx="50" cy="25" rx="9.5" ry="15" fill="#fff" stroke="#000" stroke-width="1.8" transform="rotate(0 50 50)"/>
  <ellipse cx="50" cy="25" rx="9.5" ry="15" fill="#fff" stroke="#000" stroke-width="1.8" transform="rotate(45 50 50)"/>
  <ellipse cx="50" cy="25" rx="9.5" ry="15" fill="#fff" stroke="#000" stroke-width="1.8" transform="rotate(90 50 50)"/>
  <ellipse cx="50" cy="25" rx="9.5" ry="15" fill="#fff" stroke="#000" stroke-width="1.8" transform="rotate(135 50 50)"/>
  <ellipse cx="50" cy="25" rx="9.5" ry="15" fill="#fff" stroke="#000" stroke-width="1.8" transform="rotate(180 50 50)"/>
  <ellipse cx="50" cy="25" rx="9.5" ry="15" fill="#fff" stroke="#000" stroke-width="1.8" transform="rotate(225 50 50)"/>
  <ellipse cx="50" cy="25" rx="9.5" ry="15" fill="#fff" stroke="#000" stroke-width="1.8" transform="rotate(270 50 50)"/>
  <ellipse cx="50" cy="25" rx="9.5" ry="15" fill="#fff" stroke="#000" stroke-width="1.8" transform="rotate(315 50 50)"/>

  <!-- Yellow centre -->
  <circle cx="50" cy="50" r="19" fill="#F6A800" stroke="#000" stroke-width="1.8"/>

  <!-- Eyes -->
  <ellipse cx="44.5" cy="46.5" rx="2.4" ry="3.4" fill="#000"/>
  <ellipse cx="55.5" cy="46.5" rx="2.4" ry="3.4" fill="#000"/>

  <!-- Smile -->
  <path d="M 43 54.5 Q 50 62 57 54.5" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
</svg>
